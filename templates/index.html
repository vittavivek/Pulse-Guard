<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseGuard - Air Quality Alert System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f7f6;
            color: #2b2d42;
        }

        .hero-section {
            background: linear-gradient(135deg, #11998e 0%, #0575E6 100%);
            color: white;
            padding: 60px 0 40px;
            text-align: center;
            border-radius: 0 0 30px 30px;
            margin-bottom: -40px;
            box-shadow: 0 10px 30px rgba(5, 117, 230, 0.2);
        }

        .hero-section h1 {
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .hero-section p {
            font-weight: 300;
            opacity: 0.9;
        }

        .premium-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            border: none;
            margin-bottom: 30px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .premium-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #2b2d42;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: #11998e;
            font-size: 1.5rem;
        }

        .form-floating>.form-control {
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
        }

        .form-floating>.form-control:focus {
            border-color: #11998e;
            box-shadow: 0 0 0 4px rgba(17, 153, 142, 0.1);
            background: white;
        }

        .custom-checkbox .form-check-input {
            width: 1.2em;
            height: 1.2em;
            margin-top: 0.15em;
            border-radius: 4px;
        }

        .custom-checkbox .form-check-input:checked {
            background-color: #0575E6;
            border-color: #0575E6;
        }

        .btn-analyze {
            background: linear-gradient(135deg, #11998e 0%, #0575E6 100%);
            border: none;
            border-radius: 50px;
            padding: 15px 30px;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 20px rgba(5, 117, 230, 0.3);
            transition: all 0.3s ease;
        }

        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(5, 117, 230, 0.4);
            color: white;
        }

        .map-container {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #edf2f7;
        }
    </style>
</head>

<body>

    <div class="hero-section">
        <div class="container">
            <h1><i class="bi bi-wind"></i> PulseGuard</h1>
            <p class="lead">Personalized Air Quality Intelligence for Gurugram</p>
        </div>
    </div>

    <div class="container" style="position: relative; z-index: 10; padding-top: 60px;">
        <form action="/predict" method="POST">
            <div class="row">
                <!-- Left Column -->
                <div class="col-lg-6">
                    <!-- Environmental Conditions -->
                    <div class="premium-card">
                        <div class="section-title">
                            <i class="bi bi-cloud-haze2"></i> Environmental Readings
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-floating text-muted">
                                    <input type="number" class="form-control" id="temperature" name="temperature"
                                        step="0.1" value="{{ temperature }}" required>
                                    <label for="temperature"><i class="bi bi-thermometer-half me-1"></i> Temp
                                        (°C)</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating text-muted">
                                    <input type="number" class="form-control" id="humidity" name="humidity" step="0.1"
                                        value="{{ humidity }}" required>
                                    <label for="humidity"><i class="bi bi-droplet me-1"></i> Humidity (%)</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating text-muted">
                                    <input type="number" class="form-control" id="pm10" name="pm10" step="0.1"
                                        value="{{ pm10 }}" required>
                                    <label for="pm10"><i class="bi bi-activity me-1"></i> PM10 (µg/m³)</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating text-muted">
                                    <input type="number" class="form-control" id="co2" name="co2" step="0.1"
                                        value="{{ co2 }}" required>
                                    <label for="co2"><i class="bi bi-cloud me-1"></i> CO2 (PPM)</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Health Profile -->
                    <div class="premium-card">
                        <div class="section-title">
                            <i class="bi bi-person-heart"></i> Personal Health Profile
                        </div>

                        <div class="row g-4">
                            <div class="col-md-12">
                                <div class="form-floating text-muted w-50">
                                    <input type="number" class="form-control" id="age" name="age" value="30" min="1"
                                        max="100">
                                    <label for="age"><i class="bi bi-calendar3 me-1"></i> Age</label>
                                </div>
                            </div>

                            <div class="col-md-12 custom-checkbox">
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="checkbox" id="asthma" name="asthma">
                                    <label class="form-check-label fw-500" for="asthma">
                                        I have asthma or respiratory condition
                                    </label>
                                </div>
                            </div>

                            <div class="col-md-12 custom-checkbox">
                                <label class="form-label text-muted fw-500 mb-2">Other Health Vulnerabilities</label>
                                <div class="d-flex flex-wrap gap-4">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="heart_disease"
                                            name="conditions" value="Heart disease">
                                        <label class="form-check-label" for="heart_disease">Heart disease</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="diabetes" name="conditions"
                                            value="Diabetes">
                                        <label class="form-check-label" for="diabetes">Diabetes</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="immunocompromised"
                                            name="conditions" value="Immunocompromised">
                                        <label class="form-check-label"
                                            for="immunocompromised">Immunocompromised</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="pregnant" name="conditions"
                                            value="Pregnant">
                                        <label class="form-check-label" for="pregnant">Pregnant</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Hidden time and location features -->
                    <input type="hidden" name="hour" value="{{ hour }}">
                    <input type="hidden" name="day_of_week" value="{{ day_of_week }}">
                    <input type="hidden" name="month" value="{{ month }}">
                    <input type="hidden" name="is_weekend" value="{{ is_weekend }}">
                    <input type="hidden" name="is_rush_hour" value="{{ is_rush_hour }}">
                    <input type="hidden" id="latitude" name="latitude" value="28.4595">
                    <input type="hidden" id="longitude" name="longitude" value="77.0266">

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary btn-analyze w-100 mb-4 text-white">
                        <i class="bi bi-cpu me-2"></i> Compute Personalized Risk Analysis
                    </button>
                </div>

                <!-- Right Column -->
                <div class="col-lg-6">
                    <!-- Map Card -->
                    <div class="premium-card h-100 d-flex flex-column">
                        <div class="section-title">
                            <i class="bi bi-geo-alt"></i> Live Monitoring Map
                        </div>
                        <div class="d-flex flex-column flex-grow-1" style="min-height: 450px;">
                            <div class="input-group mb-3">
                                <input type="text" id="mapSearchInput" class="form-control" placeholder="Search location (e.g. London)..." style="border-radius: 12px 0 0 12px; background: #f8fafc; border-color: #e2e8f0;">
                                <button class="btn btn-outline-primary" type="button" id="mapSearchBtn" style="border-radius: 0 12px 12px 0;"><i class="bi bi-search"></i> Search</button>
                            </div>
                            <div id="map" class="map-container flex-grow-1" style="border-radius: 15px; z-index: 1;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize map
            var map = L.map('map').setView([28.4595, 77.0266], 13); // Default Gurugram
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            var marker = L.marker([28.4595, 77.0266]).addTo(map)
                .bindPopup("Gurugram")
                .openPopup();

            // Search functionality
            document.getElementById('mapSearchBtn').addEventListener('click', function(e) {
                e.preventDefault(); // Prevent form submission
                searchLocation();
            });

            document.getElementById('mapSearchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    searchLocation();
                }
            });

            function searchLocation() {
                var query = document.getElementById('mapSearchInput').value;
                if (!query) return;

                // Simple geocoding using Nominatim
                fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query))
                    .then(response => response.json())
                    .then(data => {
                        if (data && data.length > 0) {
                            var lat = parseFloat(data[0].lat);
                            var lon = parseFloat(data[0].lon);
                            
                            map.flyTo([lat, lon], 12);
                            marker.setLatLng([lat, lon])
                                  .bindPopup(data[0].display_name)
                                  .openPopup();
                                  
                            // Update hidden inputs
                            document.getElementById('latitude').value = lat;
                            document.getElementById('longitude').value = lon;
                                  
                            // Fetch environmental data for this location
                            fetchEnvironmentalData(lat, lon);
                        } else {
                            alert('Location not found');
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        alert('Error searching location');
                    });
            }

            function fetchEnvironmentalData(lat, lon) {
                // Fetch Weather (Temp & Humidity)
                fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m`)
                    .then(res => res.json())
                    .then(weatherData => {
                        if (weatherData && weatherData.current) {
                            updateInputWithHighlight('temperature', weatherData.current.temperature_2m);
                            updateInputWithHighlight('humidity', weatherData.current.relative_humidity_2m);
                        }
                    })
                    .catch(e => console.error("Weather API Error:", e));

                // Fetch Air Quality (PM10)
                fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=pm10`)
                    .then(res => res.json())
                    .then(aqData => {
                        if (aqData && aqData.current) {
                            const pm10Val = aqData.current.pm10;
                            if (pm10Val !== null && pm10Val !== undefined) {
                                updateInputWithHighlight('pm10', pm10Val);
                                
                                // Simulate CO2 based on PM10
                                const simulatedCO2 = Math.round(400 + (pm10Val * 0.8));
                                updateInputWithHighlight('co2', simulatedCO2);
                            }
                        }
                    })
                    .catch(e => console.error("Air Quality API Error:", e));
            }

            function updateInputWithHighlight(elementId, value) {
                const el = document.getElementById(elementId);
                if (el) {
                    el.value = value;
                    // Flash light green to indicate update
                    const originalBg = el.style.backgroundColor;
                    el.style.backgroundColor = '#d4edda';
                    el.style.transition = 'background-color 0.5s ease';
                    
                    setTimeout(() => {
                        el.style.backgroundColor = originalBg || '';
                    }, 1000);
                }
            }
        });
    </script>
</body>

</html>
